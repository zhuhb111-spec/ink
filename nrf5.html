<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级 nRF5 蓝牙墨水屏传图工具 Pro</title>
    <style>
        :root {
            --primary-color: #2b579a;
            --primary-hover: #1e3d6b;
            --accent-color: #00a1f1;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dcdfe6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            padding: 25px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eaecf0;
            padding-bottom: 12px;
        }
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .layout-grid {
                grid-template-columns: 1.2fr 1fr;
            }
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        button, label.file-label {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
        }
        button:hover, label.file-label:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #c0c4cc; cursor: not-allowed; }
        #connectBtn { background-color: #2d8a4e; }
        #connectBtn:hover { background-color: #1f6136; }
        input[type="file"] { display: none; }
        
        .control-panel {
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }
        .section-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 12px;
            margin-top: 10px;
            border-left: 3px solid var(--primary-color);
            padding-left: 8px;
        }
        .section-title:first-child { margin-top: 0; }
        
        .row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }
        .row label {
            font-size: 0.85rem;
            color: #606266;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .row label span { font-weight: bold; color: var(--primary-color); }
        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            outline: none;
            background: white;
        }
        input[type="range"] {
            padding: 0;
            cursor: pointer;
        }
        
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-wrapper {
            position: relative;
            background: #e4e7ed;
            border: 2px dashed #b4bccc;
            border-radius: 8px;
            overflow: hidden;
            width: 100%;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move;
            touch-action: none;
        }
        canvas {
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }
        .canvas-hint {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 6px;
            font-size: 0.75rem;
            border-radius: 4px;
            pointer-events: none;
        }
        #status {
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #606266;
            background: #e1f3d8;
            color: #67c23a;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #c2e7b0;
        }
        #status.info { background: #f4f4f5; color: #909399; border-color: #e9e9eb; }
        #status.warn { background: #fdf6ec; color: #e6a23c; border-color: #f5dab1; }
        #status.error { background: #fef0f0; color: #f56c6c; border-color: #fde2e2; }
    </style>
</head>
<body>

<div class="container">
    <h1>高级 nRF5 墨水屏传图终端 Pro</h1>
    
    <div id="status" class="info">当前状态: 准备就绪，请先连接蓝牙或载入图片</div>

    <div class="layout-grid">
        <div class="left-panel">
            <div class="btn-group">
                <button id="connectBtn">🔌 连接屏幕蓝牙</button>
                <label class="file-label" for="fileInput">🖼️ 选择传图照片</label>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="control-panel">
                <div class="section-title">硬件参数设置</div>
                <div class="row">
                    <label>屏幕尺寸与分辨率</label>
                    <select id="resolutionSelect">
                        <option value="400x300">4.2寸 (400x300)</option>
                        <option value="800x480">7.5寸 (800x480)</option>
                        <option value="296x128">2.9寸 (296x128)</option>
                        <option value="250x122">2.13寸 (250x122)</option>
                    </select>
                </div>
                <div class="row">
                    <label>颜色渲染模式</label>
                    <select id="colorModeSelect">
                        <option value="bw">纯黑白双色</option>
                        <option value="bwr">黑白红三色 (实验性)</option>
                    </select>
                </div>

                <div class="section-title">画面构图与裁剪（支持鼠标/触摸拖拽）</div>
                <div class="row">
                    <label>缩放大小 (Zoom): <span id="zoomVal">1.0x</span></label>
                    <input type="range" id="zoomSlider" min="0.1" max="4.0" step="0.01" value="1.0">
                </div>
                <div class="row">
                    <label>横向平移 (X Offset): <span id="offsetXVal">0px</span></label>
                    <input type="range" id="offsetXSlider" min="-400" max="400" step="1" value="0">
                </div>
                <div class="row">
                    <label>纵向平移 (Y Offset): <span id="offsetYVal">0px</span></label>
                    <input type="range" id="offsetYSlider" min="-400" max="400" step="1" value="0">
                </div>
                <div style="text-align: right; margin-bottom: 5px;">
                    <button id="resetTransformBtn" style="padding: 5px 10px; font-size: 0.75rem; background:#909399;">🔄 重置构图</button>
                </div>

                <div class="section-title">高级黑白算法与程度调节</div>
                <div class="row">
                    <label>抖动/艺术算法</label>
                    <select id="ditherSelect">
                        <option value="floyd-steinberg">Floyd-Steinberg 经典抖动</option>
                        <option value="atkinson">Atkinson 细腻颗粒(推荐)</option>
                        <option value="stucki">Stucki 高清晰度抖动</option>
                        <option value="burkes">Burkes 快速滤波抖动</option>
                        <option value="bayer4">Bayer 4x4 矩阵复古点阵</option>
                        <option value="bayer8">Bayer 8x8 漫画网格点阵</option>
                        <option value="threshold">纯黑白断档阀值</option>
                    </select>
                </div>
                <div class="row">
                    <label>算法影响程度 / 黑白阀值: <span id="intensityVal">80%</span></label>
                    <input type="range" id="intensitySlider" min="0" max="100" step="1" value="80">
                </div>
            </div>
            
            <div class="btn-group" style="margin-top: 15px;">
                <button id="calendarBtn" style="background-color: #e6a23c;">📅 生成数字日历</button>
                <button id="sendBtn" disabled style="background-color: #409eff;">🚀 开始无线传输</button>
            </div>
        </div>

        <div class="canvas-container">
            <div class="section-title" style="width:100%">硬件级最终效果预览</div>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="previewCanvas" width="400" height="300"></canvas>
                <div class="canvas-hint">💡 可以在此区域内直接拖拽图片进行平移构图</div>
            </div>
        </div>
    </div>
</div>

<script>
    const BLE_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const BLE_TX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let bleDevice = null;
    let txCharacteristic = null;
    let sourceImage = null;
    let isCalendarMode = false;

    // 构图变换参数
    let imgScale = 1.0;
    let imgOffsetX = 0;
    let imgOffsetY = 0;

    // 交互拖拽状态
    let isDragging = false;
    let startX = 0, startY = 0;

    // DOM 元素元素
    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const statusDiv = document.getElementById('status');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');

    // 变换控制条
    const zoomSlider = document.getElementById('zoomSlider');
    const offsetXSlider = document.getElementById('offsetXSlider');
    const offsetYSlider = document.getElementById('offsetYSlider');
    const intensitySlider = document.getElementById('intensitySlider');
    const ditherSelect = document.getElementById('ditherSelect');
    const resolutionSelect = document.getElementById('resolutionSelect');
    const colorModeSelect = document.getElementById('colorModeSelect');

    function updateStatus(text, type='info') {
        statusDiv.innerText = "状态: " + text;
        statusDiv.className = type;
    }

    // 初始化画布分辨率
    function setResolution() {
        const [w, h] = resolutionSelect.value.split('x').map(Number);
        canvas.width = w;
        canvas.height = h;
        // 动态调整平移控制条的最大最小值
        offsetXSlider.min = -w; offsetXSlider.max = w;
        offsetYSlider.min = -h; offsetYSlider.max = h;
    }

    // 自动适配图片居中满屏
    function autoFitImage() {
        if (!sourceImage) return;
        const w = canvas.width;
        const h = canvas.height;
        const imgW = isCalendarMode ? w : sourceImage.width;
        const imgH = isCalendarMode ? h : sourceImage.height;
        
        imgScale = Math.max(w / imgW, h / imgH);
        imgOffsetX = (w - imgW * imgScale) / 2;
        imgOffsetY = (h - imgH * imgScale) / 2;
        
        syncSlidersToTransform();
    }

    function syncSlidersToTransform() {
        zoomSlider.value = imgScale;
        offsetXSlider.value = imgOffsetX;
        offsetYSlider.value = imgOffsetY;
        document.getElementById('zoomVal').innerText = imgScale.toFixed(2) + 'x';
        document.getElementById('offsetXVal').innerText = Math.round(imgOffsetX) + 'px';
        document.getElementById('offsetYVal').innerText = Math.round(imgOffsetY) + 'px';
    }

    // 核心渲染主流程
    function render() {
        if (!sourceImage && !isCalendarMode) return;
        const w = canvas.width;
        const h = canvas.height;

        // 1. 清空并绘制白色底色
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);

        // 2. 带有平移和缩放地绘制源图 (建立裁剪视角)
        ctx.save();
        ctx.translate(imgOffsetX, imgOffsetY);
        ctx.scale(imgScale, imgScale);
        if (isCalendarMode) {
            drawCalendarContent(w, h);
        } else {
            ctx.drawImage(sourceImage, 0, 0);
        }
        ctx.restore();

        // 3. 获取裁剪视窗内的图像点阵数据进行抖动算法处理
        const imgData = ctx.getImageData(0, 0, w, h);
        const ditherType = ditherSelect.value;
        const intensity = parseInt(intensitySlider.value) / 100; // 0.0 - 1.0

        // 动态修改提示文本
        if (ditherType === 'threshold') {
            document.getElementById('intensityVal').innerText = Math.round(intensity * 255);
        } else {
            document.getElementById('intensityVal').innerText = Math.round(intensity * 100) + '%';
        }

        // 执行对应的高级黑白数字图像算法
        applyAdvancedDither(imgData.data, w, h, ditherType, intensity);

        // 4. 将处理好的纯硬件像素写回画布预览
        ctx.putImageData(imgData, 0, 0);
    }

    // 算法集成调度
    function applyAdvancedDither(data, w, h, type, intensity) {
        if (type === 'threshold') {
            const thresholdValue = intensity * 255;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                const v = gray < thresholdValue ? 0 : 255;
                data[i] = data[i+1] = data[i+2] = v;
            }
            return;
        }

        if (type.startsWith('bayer')) {
            const matrix = type === 'bayer4' ? [
                [0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]
            ] : [
                [ 0, 48, 12, 60,  3, 51, 15, 63], [32, 16, 44, 28, 35, 19, 47, 31],
                [ 8, 56,  4, 52, 11, 59,  7, 55], [40, 24, 48,  2, 43, 27, 51, 23],
                [ 2, 50, 14, 62,  1, 49, 13, 61], [34, 18, 46, 30, 33, 17, 45, 29],
                [10, 58,  6, 54,  9, 57,  5, 53], [42, 26, 50, 22, 41, 25, 49, 21]
            ];
            const size = type === 'bayer4' ? 4 : 8;
            const norm = type === 'bayer4' ? 16 : 64;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    const gray = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                    const threshold = (matrix[y % size][x % size] / norm) * 255 * intensity + (1 - intensity) * 128;
                    const v = gray < threshold ? 0 : 255;
                    data[idx] = data[idx+1] = data[idx+2] = v;
                }
            }
            return;
        }

        // 误差扩散类算法架构 (Floyd, Atkinson, Stucki, Burkes)
        let ds = [];
        if (type === 'floyd-steinberg') {
            ds = [[1,0,7/16], [-1,1,3/16], [0,1,5/16], [1,1,1/16]];
        } else if (type === 'atkinson') {
            ds = [[1,0,1/8], [2,0,1/8], [-1,1,1/8], [0,1,1/8], [1,1,1/8], [0,2,1/8]];
        } else if (type === 'stucki') {
            ds = [[1,0,8/42], [2,0,4/42], [-2,1,2/42], [-1,1,4/42], [0,1,8/42], [1,1,4/42], [2,1,2/42], [-2,2,1/42], [-1,2,2/42], [0,2,4/42], [1,2,2/42], [2,2,1/42]];
        } else if (type === 'burkes') {
            ds = [[1,0,8/32], [2,0,4/32], [-2,1,2/32], [-1,1,4/32], [0,1,8/32], [1,1,4/32], [2,1,2/32]];
        }

        let grayBuf = new Float32Array(w * h);
        for (let i = 0; i < data.length; i += 4) {
            grayBuf[i/4] = (data[i] + data[i+1] + data[i+2]) / 3;
        }

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const bIdx = y * w + x;
                const oldVal = grayBuf[bIdx];
                const newVal = oldVal < 128 ? 0 : 255;
                
                const err = (oldVal - newVal) * intensity;
                grayBuf[bIdx] = newVal;

                ds.forEach(([dx, dy, factor]) => {
                    const nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                        grayBuf[ny * w + nx] += err * factor;
                    }
                });
            }
        }

        for (let i = 0; i < data.length; i += 4) {
            const v = grayBuf[i/4] < 128 ? 0 : 255;
            data[i] = data[i+1] = data[i+2] = v;
        }
    }

    function drawCalendarContent(w, h) {
        const now = new Date();
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 6;
        ctx.strokeRect(15, 15, w - 30, h - 30);
        
        ctx.fillStyle = "#000000";
        ctx.font = "bold " + Math.round(h/3) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(now.getDate().toString(), w/2, h/2 - 20);
        
        ctx.font = "bold " + Math.round(h/10) + "px sans-serif";
        ctx.fillText(`${now.getFullYear()}年 ${now.getMonth() + 1}月`, w/2, h/2 + Math.round(h/4));
        
        const weeks = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
        ctx.font = Math.round(h/14) + "px sans-serif";
        ctx.fillText(weeks[now.getDay()], w/2, h/2 + Math.round(h/3.5));
    }

    canvasWrapper.addEventListener('mousedown', (e) => {
        if (!sourceImage && !isCalendarMode) return;
        isDragging = true;
        startX = e.clientX - imgOffsetX;
        startY = e.clientY - imgOffsetY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        imgOffsetX = e.clientX - startX;
        imgOffsetY = e.clientY - startY;
        syncSlidersToTransform();
        render();
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    canvasWrapper.addEventListener('touchstart', (e) => {
        if (!sourceImage && !isCalendarMode || e.touches.length !== 1) return;
        isDragging = true;
        startX = e.touches[0].clientX - imgOffsetX;
        startY = e.touches[0].clientY - imgOffsetY;
    });

    canvasWrapper.addEventListener('touchmove', (e) => {
        if (!isDragging || e.touches.length !== 1) return;
        imgOffsetX = e.touches[0].clientX - startX;
        imgOffsetY = e.touches[0].clientY - startY;
        syncSlidersToTransform();
        render();
    });

    canvasWrapper.addEventListener('touchend', () => { isDragging = false; });

    zoomSlider.addEventListener('input', (e) => {
        imgScale = parseFloat(e.target.value);
        document.getElementById('zoomVal').innerText = imgScale.toFixed(2) + 'x';
        render();
    });
    offsetXSlider.addEventListener('input', (e) => {
        imgOffsetX = parseInt(e.target.value);
        document.getElementById('offsetXVal').innerText = imgOffsetX + 'px';
        render();
    });
    offsetYSlider.addEventListener('input', (e) => {
        imgOffsetY = parseInt(e.target.value);
        document.getElementById('offsetYVal').innerText = imgOffsetY + 'px';
        render();
    });
    intensitySlider.addEventListener('input', () => { render(); });
    ditherSelect.addEventListener('change', () => { render(); });
    colorModeSelect.addEventListener('change', () => { render(); });
    
    resolutionSelect.addEventListener('change', () => {
        setResolution();
        autoFitImage();
        render();
    });

    document.getElementById('resetTransformBtn').addEventListener('click', () => {
        autoFitImage();
        render();
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            sourceImage = new Image();
            sourceImage.onload = () => {
                isCalendarMode = false;
                autoFitImage();
                render();
                updateStatus("🟢 图片成功加载，请开始微调构图和算法效果", "success");
            };
            sourceImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('calendarBtn').addEventListener('click', () => {
        isCalendarMode = true;
        sourceImage = null;
        autoFitImage();
        render();
        updateStatus("📅 日历模版生成成功", "success");
    });

    connectBtn.addEventListener('click', async () => {
        if (!navigator.bluetooth) {
            updateStatus("❌ 您的浏览器不支持Web蓝牙协议！请在安卓Chrome/Edge或iOS的Bluefy浏览器中打开。", "error");
            return;
        }
        try {
            updateStatus("正在寻找蓝牙名称前缀为 EPD 的墨水屏...", "warn");
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'EPD' }, { services: [BLE_SERVICE_UUID] }],
                optionalServices: [BLE_SERVICE_UUID]
            });
            
            updateStatus("已经发现设备，正建立 GATT 握手连接...", "warn");
            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(BLE_SERVICE_UUID);
            txCharacteristic = await service.getCharacteristic(BLE_TX_UUID);
            
            updateStatus("🟢 蓝牙连接成功！可以开始无线传图", "success");
            connectBtn.innerText = "✅ 蓝牙连接正常";
            connectBtn.style.backgroundColor = "#1f6136";
            sendBtn.disabled = false;
        } catch (error) {
            console.error(error);
            updateStatus("连接失败: " + error.message, "error");
        }
    });

    sendBtn.addEventListener('click', async () => {
        if (!txCharacteristic) return;
        try {
            const w = canvas.width, h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h).data;
            
            let buffer = [];
            let currentByte = 0;
            let bitCount = 0;

            for (let i = 0; i < imgData.length; i += 4) {
                const bit = imgData[i] > 128 ? 1 : 0;
                currentByte = (currentByte << 1) | bit;
                bitCount++;
                if (bitCount === 8) {
                    buffer.push(currentByte);
                    currentByte = 0;
                    bitCount = 0;
                }
            }

            const payload = new Uint8Array(buffer);
            const chunkSize = 20;
            
            sendBtn.disabled = true;
            for (let offset = 0; offset < payload.length; offset += chunkSize) {
                const chunk = payload.slice(offset, offset + chunkSize);
                await txCharacteristic.writeValueWithoutResponse(chunk);
                const progress = Math.min(100, Math.round((offset / payload.length) * 100));
                updateStatus(`🚀 正在无线同步画布点阵... ${progress}%`, "warn");
            }
            updateStatus("🎉 数据传输完毕！墨水屏正在电子显色刷新...", "success");
            sendBtn.disabled = false;
        } catch (error) {
            updateStatus("传输被强行中断: " + error.message, "error");
            sendBtn.disabled = false;
        }
    });

    setResolution();
</script>
</body>
</html>
